name: Update Subscription

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download
        run: |
          curl -L "https://raw.githubusercontent.com/pesarkermani/my_sub/main/sub.txt" -o sub.txt

      - name: Replace Name
        run: |
          sed -i 's/@NamazVPN/@PEZHMAN/g' sub.txt

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add sub.txt
          git commit -m "update" || exit 0
          git push
